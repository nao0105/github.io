<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テトリス - Tetris Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'ヒラギノ角ゴ Pro', 'Hiragino Kaku Gothic Pro', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .sidebar {
            flex: 0 0 220px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #667eea;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-item label {
            font-size: 12px;
            font-weight: bold;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item .score,
        .info-item .level,
        .info-item .lines {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .next-piece {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .next-piece label {
            font-size: 12px;
            font-weight: bold;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #nextCanvas {
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 10px;
            width: 120px;
            height: 120px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #startBtn:active {
            transform: translateY(0);
        }

        #pauseBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        #pauseBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        #pauseBtn:active {
            transform: translateY(0);
        }

        #resetBtn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        #resetBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        #resetBtn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .instructions {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .instructions h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .instructions p {
            font-size: 12px;
            color: #666;
            line-height: 1.8;
            margin: 5px 0;
        }

        .game-board {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #667eea;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            height: auto;
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 12px;
            padding: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 20px;
            }

            .sidebar {
                flex: 1 1 auto;
                width: 100%;
                max-width: 400px;
            }

            .game-board {
                width: 100%;
            }

            #gameCanvas {
                width: 100%;
                max-width: 400px;
            }

            .instructions {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .game-wrapper {
                padding: 15px;
            }

            .sidebar h1 {
                font-size: 20px;
            }

            .btn {
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="sidebar">
                <h1>テトリス</h1>
                <div class="info-panel">
                    <div class="info-item">
                        <label>スコア</label>
                        <div class="score">0</div>
                    </div>
                    <div class="info-item">
                        <label>レベル</label>
                        <div class="level">1</div>
                    </div>
                    <div class="info-item">
                        <label>ラインクリア</label>
                        <div class="lines">0</div>
                    </div>
                </div>
                <div class="next-piece">
                    <label>次のピース</label>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>
                <div class="controls">
                    <button id="startBtn" class="btn">スタート</button>
                    <button id="pauseBtn" class="btn">一時停止</button>
                    <button id="resetBtn" class="btn">リセット</button>
                </div>
                <div class="instructions">
                    <h3>操作方法</h3>
                    <p>⬅️ ➡️：左右移動</p>
                    <p>⬆️：回転</p>
                    <p>⬇️：高速落下</p>
                    <p>スペース：即座に落下</p>
                </div>
            </div>
            <div class="game-board">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 Tetris Game</p>
        </div>
    </div>

    <script>
        // Tetris Game
        class TetrisGame {
            constructor() {
                // Canvas Setup
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');

                // Game Constants
                this.COLS = 10;
                this.ROWS = 20;
                this.CELL_SIZE = this.canvas.width / this.COLS;

                // Game State
                this.board = Array(this.ROWS).fill(null).map(() => Array(this.COLS).fill(0));
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                this.gamePaused = false;
                this.dropSpeed = 800; // milliseconds

                // Tetromino Pieces
                this.pieces = {
                    I: { shape: [[1, 1, 1, 1]], color: '#00f0f1' },
                    O: { shape: [[1, 1], [1, 1]], color: '#f0f100' },
                    T: { shape: [[0, 1, 0], [1, 1, 1]], color: '#f000f0' },
                    S: { shape: [[0, 1, 1], [1, 1, 0]], color: '#00f000' },
                    Z: { shape: [[1, 1, 0], [0, 1, 1]], color: '#f00000' },
                    J: { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000f0' },
                    L: { shape: [[0, 0, 1], [1, 1, 1]], color: '#f0a000' }
                };

                this.pieceNames = Object.keys(this.pieces);

                // Current Piece
                this.currentPiece = null;
                this.currentX = 0;
                this.currentY = 0;
                this.nextPiece = null;

                // UI Elements
                this.scoreDisplay = document.querySelector('.score');
                this.levelDisplay = document.querySelector('.level');
                this.linesDisplay = document.querySelector('.lines');
                this.startBtn = document.getElementById('startBtn');
                this.pauseBtn = document.getElementById('pauseBtn');
                this.resetBtn = document.getElementById('resetBtn');

                // Event Listeners
                this.startBtn.addEventListener('click', () => this.start());
                this.pauseBtn.addEventListener('click', () => this.togglePause());
                this.resetBtn.addEventListener('click', () => this.reset());
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));

                // Game Loop
                this.gameLoopInterval = null;
                this.dropInterval = null;

                // Initialize
                this.init();
            }

            init() {
                this.spawnNewPiece();
                this.drawBoard();
                this.drawNextPiece();
            }

            start() {
                if (this.gameRunning) return;
                this.gameRunning = true;
                this.gamePaused = false;
                this.startBtn.disabled = true;
                this.pauseBtn.disabled = false;
                this.startDropLoop();
            }

            togglePause() {
                if (!this.gameRunning) return;
                this.gamePaused = !this.gamePaused;
                this.pauseBtn.textContent = this.gamePaused ? '再開' : '一時停止';
                if (!this.gamePaused) {
                    this.startDropLoop();
                } else {
                    clearInterval(this.dropInterval);
                }
            }

            reset() {
                this.gameRunning = false;
                this.gamePaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropSpeed = 800;
                this.board = Array(this.ROWS).fill(null).map(() => Array(this.COLS).fill(0));
                this.startBtn.disabled = false;
                this.pauseBtn.disabled = true;
                this.pauseBtn.textContent = '一時停止';
                clearInterval(this.dropInterval);
                this.updateUI();
                this.spawnNewPiece();
                this.drawBoard();
                this.drawNextPiece();
            }

            spawnNewPiece() {
                if (this.nextPiece) {
                    this.currentPiece = this.nextPiece;
                } else {
                    const randomPiece = this.pieceNames[Math.floor(Math.random() * this.pieceNames.length)];
                    this.currentPiece = this.pieces[randomPiece];
                }

                const randomNextPiece = this.pieceNames[Math.floor(Math.random() * this.pieceNames.length)];
                this.nextPiece = this.pieces[randomNextPiece];

                this.currentX = Math.floor(this.COLS / 2) - Math.floor(this.currentPiece.shape[0].length / 2);
                this.currentY = 0;

                // Check for game over
                if (!this.canMovePiece(this.currentX, this.currentY)) {
                    this.gameOver();
                }

                this.drawNextPiece();
            }

            canMovePiece(x, y, piece = this.currentPiece.shape) {
                for (let row = 0; row < piece.length; row++) {
                    for (let col = 0; col < piece[row].length; col++) {
                        if (piece[row][col] === 0) continue;

                        const newX = x + col;
                        const newY = y + row;

                        if (newX < 0 || newX >= this.COLS || newY >= this.ROWS) return false;
                        if (newY >= 0 && this.board[newY][newX] !== 0) return false;
                    }
                }
                return true;
            }

            placePiece() {
                for (let row = 0; row < this.currentPiece.shape.length; row++) {
                    for (let col = 0; col < this.currentPiece.shape[row].length; col++) {
                        if (this.currentPiece.shape[row][col] === 0) continue;

                        const x = this.currentX + col;
                        const y = this.currentY + row;

                        if (y >= 0) {
                            this.board[y][x] = this.currentPiece.color;
                        }
                    }
                }
            }

            dropPiece() {
                if (!this.gamePaused && this.gameRunning) {
                    if (this.canMovePiece(this.currentX, this.currentY + 1)) {
                        this.currentY++;
                    } else {
                        this.placePiece();
                        this.checkLines();
                        this.spawnNewPiece();
                    }
                    this.drawBoard();
                }
            }

            rotatePiece() {
                const rotated = this.currentPiece.shape[0].map((_, i) =>
                    this.currentPiece.shape.map(row => row[i]).reverse()
                );

                if (this.canMovePiece(this.currentX, this.currentY, rotated)) {
                    this.currentPiece.shape = rotated;
                    this.drawBoard();
                }
            }

            movePiece(direction) {
                const newX = this.currentX + direction;
                if (this.canMovePiece(newX, this.currentY)) {
                    this.currentX = newX;
                    this.drawBoard();
                }
            }

            hardDrop() {
                while (this.canMovePiece(this.currentX, this.currentY + 1)) {
                    this.currentY++;
                    this.score += 2;
                }
                this.dropPiece();
            }

            checkLines() {
                let linesCleared = 0;

                for (let row = this.ROWS - 1; row >= 0; row--) {
                    if (this.board[row].every(cell => cell !== 0)) {
                        this.board.splice(row, 1);
                        this.board.unshift(Array(this.COLS).fill(0));
                        linesCleared++;
                        row++;
                    }
                }

                if (linesCleared > 0) {
                    const points = [0, 100, 300, 500, 800];
                    this.score += points[linesCleared] * this.level;
                    this.lines += linesCleared;

                    // Update level
                    const newLevel = Math.floor(this.lines / 10) + 1;
                    if (newLevel > this.level) {
                        this.level = newLevel;
                        this.dropSpeed = Math.max(200, 800 - (this.level - 1) * 50);
                        this.startDropLoop();
                    }

                    this.updateUI();
                }
            }

            gameOver() {
                this.gameRunning = false;
                this.startBtn.disabled = false;
                this.pauseBtn.disabled = true;
                clearInterval(this.dropInterval);
                alert(`ゲームオーバー！\nスコア: ${this.score}\nレベル: ${this.level}\nラインクリア: ${this.lines}`);
            }

            handleKeyPress(e) {
                if (!this.gameRunning || this.gamePaused) return;

                switch (e.key) {
                    case 'ArrowLeft':
                        this.movePiece(-1);
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        this.movePiece(1);
                        e.preventDefault();
                        break;
                    case 'ArrowUp':
                        this.rotatePiece();
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                        this.dropPiece();
                        e.preventDefault();
                        break;
                    case ' ':
                        this.hardDrop();
                        e.preventDefault();
                        break;
                }
            }

            startDropLoop() {
                clearInterval(this.dropInterval);
                this.dropInterval = setInterval(() => this.dropPiece(), this.dropSpeed);
            }

            drawBoard() {
                // Clear canvas
                this.ctx.fillStyle = '#1a1a2e';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw grid
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 0.5;
                for (let i = 0; i <= this.COLS; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.CELL_SIZE, 0);
                    this.ctx.lineTo(i * this.CELL_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= this.ROWS; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.CELL_SIZE);
                    this.ctx.lineTo(this.canvas.width, i * this.CELL_SIZE);
                    this.ctx.stroke();
                }

                // Draw placed pieces
                for (let row = 0; row < this.ROWS; row++) {
                    for (let col = 0; col < this.COLS; col++) {
                        if (this.board[row][col] !== 0) {
                            this.drawCell(col, row, this.board[row][col]);
                        }
                    }
                }

                // Draw current piece
                for (let row = 0; row < this.currentPiece.shape.length; row++) {
                    for (let col = 0; col < this.currentPiece.shape[row].length; col++) {
                        if (this.currentPiece.shape[row][col] !== 0) {
                            this.drawCell(this.currentX + col, this.currentY + row, this.currentPiece.color);
                        }
                    }
                }
            }

            drawCell(x, y, color) {
                this.ctx.fillStyle = color;
                this.ctx.fillRect(x * this.CELL_SIZE + 1, y * this.CELL_SIZE + 1, this.CELL_SIZE - 2, this.CELL_SIZE - 2);

                // Add border for depth
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(x * this.CELL_SIZE + 1, y * this.CELL_SIZE + 1, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
            }

            drawNextPiece() {
                this.nextCtx.fillStyle = '#fff';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);

                if (this.nextPiece) {
                    const cellSize = 20;
                    const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * cellSize) / 2;
                    const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * cellSize) / 2;

                    for (let row = 0; row < this.nextPiece.shape.length; row++) {
                        for (let col = 0; col < this.nextPiece.shape[row].length; col++) {
                            if (this.nextPiece.shape[row][col] !== 0) {
                                this.nextCtx.fillStyle = this.nextPiece.color;
                                this.nextCtx.fillRect(
                                    offsetX + col * cellSize,
                                    offsetY + row * cellSize,
                                    cellSize - 2,
                                    cellSize - 2
                                );
                            }
                        }
                    }
                }
            }

            updateUI() {
                this.scoreDisplay.textContent = this.score;
                this.levelDisplay.textContent = this.level;
                this.linesDisplay.textContent = this.lines;
            }
        }

        // Initialize Game
        window.addEventListener('DOMContentLoaded', () => {
            new TetrisGame();
        });
    </script>
</body>
</html>
